<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen flex items-center justify-center">

    <div id="login-page" class="w-full max-w-[500px] p-12 bg-white rounded-lg">
        <div class="flex flex-col items-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-28 mb-8">
            
            <h1 class="text-3xl font-bold text-[#1e293b] mb-2 text-center">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-lg mb-10 text-center">Sign in to manage your issues</p>
        </div>

        <div class="space-y-6">
            <div class="form-control w-full">
                <label class="label p-0 mb-2">
                    <span class="label-text text-lg font-medium mt-1 text-gray-800">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full h-14 text-base focus:outline-none focus:border-blue-500 bg-white" />
                <p class="text-[#4A00FF] text-sm font-regular ">Default: admin</p>
            </div>

            <div class="form-control w-full">
                <label class="label p-0 mb-2">
                    <span class="label-text text-lg font-medium mt-1 text-gray-800">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full h-14 text-base focus:outline-none focus:border-blue-500 bg-white" />
                <p class="text-[#4a00ff] text-sm font-regular">Default: admin123</p>
            </div>

            <button onclick="handleLogin()" class="btn w-full h-14 mt-4 bg-[#4a00ff] hover:bg-[#3d00cc] text-white text-xl font-semibold border-none capitalize shadow-md">
                Sign In
            </button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden min-h-screen bg-gray-50 w-full">
        <nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-2 ml-4">
                <span class="text-xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</span>
            </div>

            <div class="flex items-center gap-3 mr-4">
                <div class="relative">
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search issues..." 
                        class="input input-bordered w-64 h-10 bg-gray-50 text-sm focus:ring-1 focus:ring-blue-500"
                    />
                </div>
                <button onclick="handleSearch()" class="btn btn-sm h-10 px-4 bg-[#4a00ff] hover:bg-[#3d00cc] text-white border-none normal-case">
                    + New Issue
                </button>
            </div>
        </nav>

        <div class="max-w-[1200px] mx-auto p-8">
             <h1 class="text-2xl font-semibold text-gray-700">Successfully Logged In</h1>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
