<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <!--fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--talwind+daisyui-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-white min-h-screen flex items-center justify-center">
    <!--login part-->
    <div id="login-page" class="w-full max-w-[500px] p-12 bg-white rounded-lg">
        <div class="flex flex-col items-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-28 mb-8">
            
            <h1 class="text-3xl font-bold text-[#1e293b] mb-2 text-center">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-lg mb-10 text-center">Sign in to manage your issues</p>
        </div>

        <div class="space-y-6">
            <div class="form-control w-full">
                <label class="label p-0 mb-2">
                    <span class="label-text text-lg font-medium mt-1 text-gray-800">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full h-14 text-base focus:outline-none focus:border-blue-500 bg-white" />
                <p class="text-[#4A00FF] text-sm font-regular ">Default: admin</p>
            </div>

            <div class="form-control w-full">
                <label class="label p-0 mb-2">
                    <span class="label-text text-lg font-medium mt-1 text-gray-800">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full h-14 text-base focus:outline-none focus:border-blue-500 bg-white" />
                <p class="text-[#4a00ff] text-sm font-regular">Default: admin123</p>
            </div>

            <button onclick="handleLogin()" class="btn w-full h-14 mt-4 bg-[#4a00ff] hover:bg-[#3d00cc] text-white text-xl font-semibold border-none capitalize shadow-md">
                Sign In
            </button>
        </div>
    </div>
     <!--dashboard-->
    <div id="main-dashboard" class="hidden min-h-screen bg-gray-50 w-full">
        <nav class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-2 ml-4">
                <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8">
                <span class="text-xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</span>
            </div>

            <div class="flex items-center gap-3 mr-4">
                <!--search parts-->
                <div class="relative flex items-center">
    <div class="absolute left-4 flex items-center justify-center pointer-events-none z-20">
        <i class="fa-solid fa-magnifying-glass text-[#64748b]" style="font-size: 0.875rem;"></i>
    </div>
    <input 
        type="text" 
        id="search-input"
        placeholder="Search issues..." 
        class="input input-bordered w-64 h-10 pl-11 bg-white text-sm focus:outline-none focus:border-[#4a00ff] placeholder:text-gray-400"
    />
</div>
                          <!--new issue part-->
                <button onclick="handleSearch()" class="btn btn-sm h-10 px-4 bg-[#4a00ff] hover:bg-[#3d00cc] text-white border-none normal-case">
                    + New Issue
                </button>
            </div>
        </nav>

        <div class="max-w-[1200px] mx-auto p-8">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="filterIssues('all')" class="btn btn-md px-10 bg-[#4a00ff] hover:bg-[#3d00cc] text-white border-none rounded-lg">
                    All
                </button>
                <button onclick="filterIssues('open')" class="btn btn-md px-10 bg-white hover:bg-gray-100 text-gray-500 border border-gray-200 rounded-lg">
                    Open
                </button>
                <button onclick="filterIssues('closed')" class="btn btn-md px-10 bg-white hover:bg-gray-100 text-gray-500 border border-gray-200 rounded-lg">
                    Closed
                </button>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl p-6 mb-8 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-gray-50 rounded-full">
                        <img src="./assets/Aperture.png" alt="Aperture" class="w-8 h-8">
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-[#64748b]"><span id="issue-count">50</span> Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#00a96e]"></div>
                        <span class="text-gray-700 font-medium">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#a855f7]"></div>
                        <span class="text-gray-700 font-medium">Closed</span>
                    </div>
                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
